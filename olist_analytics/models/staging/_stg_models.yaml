version: 2

models:
  - name: stg_customers
    description: "Cleaned and renamed list of Olist customers."
    columns:
      - name: customer_key
        description: "Primary key. Unique identifier for a customer's specific order location."
        tests:
          - unique
          - not_null

  - name: stg_orders
    description: "Cleaned e-commerce orders table with explicit timestamps."
    columns:
      - name: order_id
        description: "Primary key. Unique identifier for each order."
        tests:
          - unique
          - not_null
      - name: customer_key
        description: "Foreign key linking back to stg_customers."
        tests:
          - not_null
          - relationships:
              to: ref('stg_customers')
              field: customer_key